# Deploy API + Celery worker to Cloud Run; run DB migrations via Cloud Run Job.
#
# Prerequisites (GCP — see scripts/gcp/bootstrap.sh for API enablement):
#   - Artifact Registry repo, Cloud SQL Postgres, Memorystore Redis, VPC connector
#   - Runtime SA: roles/cloudsql.client, roles/secretmanager.secretAccessor
#   - Deploy SA + Workload Identity Federation for GitHub (no JSON keys)
#   - Secret Manager secrets (names must match this file or edit references):
#       beaconflame-django-secret-key, beaconflame-database-url, beaconflame-api-key-pepper,
#       beaconflame-celery-broker-url, beaconflame-celery-result-backend
#
# GitHub repository variables (Settings → Secrets and variables → Actions → Variables):
#   GCP_PROJECT_ID, GCP_REGION, AR_REPOSITORY, CLOUDSQL_INSTANCE, VPC_CONNECTOR,
#   RUNTIME_SERVICE_ACCOUNT (email), ALLOWED_HOSTS, CORS_ALLOWED_ORIGINS, CSRF_TRUSTED_ORIGINS
# Optional: CLOUD_RUN_SERVICE_API, CLOUD_RUN_SERVICE_WORKER, CLOUD_RUN_JOB_MIGRATE,
#           GOOGLE_OAUTH_CLIENT_ID (comma-separated client IDs)
#
# GitHub Actions — WIF (set BOTH values; secret OR variable per key, secret wins in the resolve step):
#   GCP_WORKLOAD_IDENTITY_PROVIDER — full resource name (projects/…/locations/global/workloadIdentityPools/…/providers/…)
#   GCP_SERVICE_ACCOUNT — deployer service account email
#
# GitHub Environment: if WIF lives under **Settings → Environments → (name) → Environment secrets**,
# the deploy job must use that environment (see `environment:` on deploy). Set **repository** variable
# GCP_ACTIONS_ENVIRONMENT to that environment name (e.g. production). Do not put that name only as an Environment secret.
#
# GCP_WORKLOAD_IDENTITY_PROVIDER must be the provider **resource name** from GCP:
#   projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL_ID/providers/PROVIDER_ID
# (NOT principal://… — that is for IAM bindings, not for google-github-actions/auth.)
#
# In GCP, the OIDC provider **Attribute condition** for GitHub Actions must use token claims only,
# e.g. assertion.repository == "ORG/REPO" (not google.subject). See:
# https://cloud.google.com/iam/docs/workload-identity-federation-with-deployment-pipelines#conditions

name: Deploy GCP

on:
  push:
    branches: [master]

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-gcp-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: beaconflame-api

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Pytest
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
        run: pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    environment:
      # Use a GitHub Environment so Environment-scoped secrets/vars are visible. Default name is production
      # if GCP_ACTIONS_ENVIRONMENT is unset — create that Environment in the repo (it can be empty).
      name: ${{ case(vars.GCP_ACTIONS_ENVIRONMENT != '', vars.GCP_ACTIONS_ENVIRONMENT, 'production') }}
      deployment: false
    # Resolve vars here (not only workflow-level env) so Environment-scoped Actions variables apply.
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      AR_REPOSITORY: ${{ vars.AR_REPOSITORY }}
      IMAGE_NAME: beaconflame-api
    steps:
      - uses: actions/checkout@v4

      # Secrets/vars in job-level env + case() can arrive empty on the runner; map them in step env then export for later steps.
      - name: Resolve GCP WIF for auth
        env:
          WIF_S: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          WIF_V: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          SA_S: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          SA_V: ${{ vars.GCP_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          WIF="${WIF_S:-${WIF_V:-}}"
          SA="${SA_S:-${SA_V:-}}"
          if [ -z "${WIF}" ] || [ -z "${SA}" ]; then
            echo "::error::Missing GCP_WORKLOAD_IDENTITY_PROVIDER or GCP_SERVICE_ACCOUNT."
            echo "Add them as repository or Environment secrets/variables (exact names). For Environment secrets, set repo variable GCP_ACTIONS_ENVIRONMENT to that environment name (or create GitHub Environment 'production')."
            exit 1
          fi

          # Strip whitespace, CR, and leading/trailing slashes. A leading "/" (common copy-paste from
          # console) breaks validation and google-github-actions/auth even though the path has 8 segments.
          WIF="$(printf '%s' "${WIF}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' | tr -d '\r' | sed -e 's|^/*||' -e 's|/*$||')"
          SA="$(printf '%s' "${SA}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' | tr -d '\r')"

          echo "=== GCP WIF debug (repr may show *** — GitHub masks secret substrings in logs; byte lengths are still real) ==="
          if [ -n "${WIF_S}" ]; then echo "WIF source: secret (non-empty)"; else echo "WIF source: variable (secret empty)"; fi
          if [ -n "${SA_S}" ]; then echo "SA source: secret (non-empty)"; else echo "SA source: variable (secret empty)"; fi
          echo "WIF byte length: ${#WIF}"
          echo "SA byte length: ${#SA}"
          printf 'WIF first 240 bytes (repr; GitHub may mask): '
          printf '%s' "${WIF}" | head -c 240 | python3 -c "import sys; print(repr(sys.stdin.read()))"
          printf 'SA first 160 bytes (repr): '
          printf '%s' "${SA}" | head -c 160 | python3 -c "import sys; print(repr(sys.stdin.read()))"
          if [[ "${WIF}" == projects/* ]]; then echo "WIF starts with projects/: yes"; else echo "WIF starts with projects/: no"; fi
          if [[ "${WIF}" == *"/locations/global/workloadIdentityPools/"* ]]; then echo "WIF has workloadIdentityPools segment: yes"; else echo "WIF has workloadIdentityPools segment: no"; fi
          if [[ "${WIF}" == *"/providers/"* ]]; then echo "WIF has /providers/ segment: yes"; else echo "WIF has /providers/ segment: no"; fi
          echo "=== end debug ==="

          # Bash `case` globs can reject values that still pass substring checks; validate with Python (flush-left heredoc).
          cat <<'ENDPY' >/tmp/validate_wif.py
          import re
          import sys

          w = sys.stdin.read().strip()
          if w.startswith("principal://"):
              print(
                  "::error::GCP_WORKLOAD_IDENTITY_PROVIDER is principal://… "
                  "(IAM binding form). Use the provider resource name: "
                  "projects/…/locations/global/workloadIdentityPools/…/providers/…"
              )
              raise SystemExit(1)
          parts = [p for p in w.split("/") if p != ""]
          lens = [len(p) for p in parts]
          print(f"WIF_segment_count={len(parts)} WIF_segment_lens={lens}")
          ok = re.fullmatch(
              r"projects/[^/]+/locations/global/workloadIdentityPools/[^/]+/providers/[^/]+",
              w,
          )
          if ok:
              raise SystemExit(0)
          print("::error::GCP_WORKLOAD_IDENTITY_PROVIDER is not the expected 8-segment resource name.")
          if len(parts) != 8:
              print(f"::notice::Expected exactly 8 non-empty path segments when split on '/'; got {len(parts)}.")
          else:
              want = ("projects", "locations", "global", "workloadIdentityPools", "providers")
              idx = (0, 2, 3, 4, 6)
              for i, label in zip(idx, want):
                  if i >= len(parts) or parts[i] != label:
                      got = parts[i] if i < len(parts) else "MISSING"
                      print(f"::notice::Segment {i} should be {label!r}; got {got!r}.")
                      break
          bad = [(i, hex(ord(c))) for i, c in enumerate(w) if ord(c) < 33 or ord(c) > 126]
          if bad:
              print(f"::notice::Non-printable or unusual codepoints (index, hex): {bad[:24]}")
          raise SystemExit(1)
          ENDPY
          if ! printf '%s' "${WIF}" | python3 /tmp/validate_wif.py; then
            exit 1
          fi
          {
            echo "GCP_WIF_PROVIDER<<__EOF_WIF__"
            printf '%s' "${WIF}"
            echo ""
            echo "__EOF_WIF__"
          } >> "${GITHUB_ENV}"
          {
            echo "GCP_WIF_SA<<__EOF_SA__"
            printf '%s' "${SA}"
            echo ""
            echo "__EOF_SA__"
          } >> "${GITHUB_ENV}"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          set -euo pipefail
          : "${GCP_REGION:?Set Actions variable GCP_REGION (repository or Environment, e.g. us-central1). Empty region produced invalid host -docker.pkg.dev.}"
          HOST="${GCP_REGION}-docker.pkg.dev"
          gcloud auth configure-docker "${HOST}" --quiet
          # Some runners still attempt an anonymous push unless we explicitly log in.
          gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin "${HOST}"

      - name: Build and push image
        run: |
          set -euo pipefail
          : "${GCP_PROJECT_ID:?Set repo variable GCP_PROJECT_ID}"
          : "${GCP_REGION:?Set repo variable GCP_REGION}"
          : "${AR_REPOSITORY:?Set repo variable AR_REPOSITORY}"
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -t "${IMAGE}" .
          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Deploy Cloud Run (API)
        env:
          CLOUDSQL_INSTANCE: ${{ vars.CLOUDSQL_INSTANCE }}
          VPC_CONNECTOR: ${{ vars.VPC_CONNECTOR }}
          RUNTIME_SERVICE_ACCOUNT: ${{ vars.RUNTIME_SERVICE_ACCOUNT }}
          ALLOWED_HOSTS: ${{ vars.ALLOWED_HOSTS }}
          CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
          CSRF_TRUSTED_ORIGINS: ${{ vars.CSRF_TRUSTED_ORIGINS }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
          CLOUD_RUN_SERVICE_API: ${{ vars.CLOUD_RUN_SERVICE_API }}
        run: |
          set -euo pipefail
          : "${CLOUDSQL_INSTANCE:?Set repo variable CLOUDSQL_INSTANCE (project:region:instance)}"
          : "${VPC_CONNECTOR:?Set repo variable VPC_CONNECTOR}"
          : "${RUNTIME_SERVICE_ACCOUNT:?Set repo variable RUNTIME_SERVICE_ACCOUNT}"
          : "${ALLOWED_HOSTS:?Set repo variable ALLOWED_HOSTS}"
          NAME="${CLOUD_RUN_SERVICE_API:-beaconflame-api}"
          if [ -z "${NAME}" ]; then NAME=beaconflame-api; fi
          SEC_COMMON="SECRET_KEY=beaconflame-django-secret-key:latest,DATABASE_URL=beaconflame-database-url:latest,API_KEY_PEPPER=beaconflame-api-key-pepper:latest,CELERY_BROKER_URL=beaconflame-celery-broker-url:latest,CELERY_RESULT_BACKEND=beaconflame-celery-result-backend:latest"
          python3 <<'PY'
          import json
          import os

          out = {
              "DJANGO_SETTINGS_MODULE": "config.settings.production",
              "RUN_MIGRATE_ON_START": "0",
              "ALLOWED_HOSTS": os.environ["ALLOWED_HOSTS"],
          }
          for k in ("CORS_ALLOWED_ORIGINS", "CSRF_TRUSTED_ORIGINS", "GOOGLE_OAUTH_CLIENT_ID"):
              v = os.environ.get(k)
              if v:
                  out[k] = v
          open("/tmp/run-env.json", "w", encoding="utf-8").write(json.dumps(out))
          PY
          gcloud run deploy "${NAME}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --image="${IMAGE}" \
            --platform=managed \
            --service-account="${RUNTIME_SERVICE_ACCOUNT}" \
            --add-cloudsql-instances="${CLOUDSQL_INSTANCE}" \
            --vpc-connector="${VPC_CONNECTOR}" \
            --vpc-egress=all-traffic \
            --ingress=all \
            --allow-unauthenticated \
            --env-vars-file=/tmp/run-env.json \
            --set-secrets="${SEC_COMMON}"

      - name: Deploy Cloud Run (Celery worker)
        env:
          CLOUDSQL_INSTANCE: ${{ vars.CLOUDSQL_INSTANCE }}
          VPC_CONNECTOR: ${{ vars.VPC_CONNECTOR }}
          RUNTIME_SERVICE_ACCOUNT: ${{ vars.RUNTIME_SERVICE_ACCOUNT }}
          ALLOWED_HOSTS: ${{ vars.ALLOWED_HOSTS }}
          CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
          CSRF_TRUSTED_ORIGINS: ${{ vars.CSRF_TRUSTED_ORIGINS }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
          CLOUD_RUN_SERVICE_WORKER: ${{ vars.CLOUD_RUN_SERVICE_WORKER }}
        run: |
          set -euo pipefail
          : "${CLOUDSQL_INSTANCE:?Set repo variable CLOUDSQL_INSTANCE}"
          : "${VPC_CONNECTOR:?Set repo variable VPC_CONNECTOR}"
          : "${RUNTIME_SERVICE_ACCOUNT:?Set repo variable RUNTIME_SERVICE_ACCOUNT}"
          : "${ALLOWED_HOSTS:?Set repo variable ALLOWED_HOSTS}"
          NAME="${CLOUD_RUN_SERVICE_WORKER:-beaconflame-worker}"
          if [ -z "${NAME}" ]; then NAME=beaconflame-worker; fi
          SEC_COMMON="SECRET_KEY=beaconflame-django-secret-key:latest,DATABASE_URL=beaconflame-database-url:latest,API_KEY_PEPPER=beaconflame-api-key-pepper:latest,CELERY_BROKER_URL=beaconflame-celery-broker-url:latest,CELERY_RESULT_BACKEND=beaconflame-celery-result-backend:latest"
          python3 <<'PY'
          import json
          import os

          out = {
              "DJANGO_SETTINGS_MODULE": "config.settings.production",
              "RUN_MIGRATE_ON_START": "0",
              "ALLOWED_HOSTS": os.environ["ALLOWED_HOSTS"],
          }
          for k in ("CORS_ALLOWED_ORIGINS", "CSRF_TRUSTED_ORIGINS", "GOOGLE_OAUTH_CLIENT_ID"):
              v = os.environ.get(k)
              if v:
                  out[k] = v
          open("/tmp/run-env.json", "w", encoding="utf-8").write(json.dumps(out))
          PY
          gcloud run deploy "${NAME}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --image="${IMAGE}" \
            --platform=managed \
            --service-account="${RUNTIME_SERVICE_ACCOUNT}" \
            --add-cloudsql-instances="${CLOUDSQL_INSTANCE}" \
            --vpc-connector="${VPC_CONNECTOR}" \
            --vpc-egress=all-traffic \
            --ingress=all \
            --no-allow-unauthenticated \
            --min-instances=1 \
            --no-cpu-throttling \
            --command=python \
            --args=docker/celery_cloudrun.py \
            --env-vars-file=/tmp/run-env.json \
            --set-secrets="${SEC_COMMON}"

      - name: Deploy and run migrate job
        env:
          CLOUDSQL_INSTANCE: ${{ vars.CLOUDSQL_INSTANCE }}
          RUNTIME_SERVICE_ACCOUNT: ${{ vars.RUNTIME_SERVICE_ACCOUNT }}
          ALLOWED_HOSTS: ${{ vars.ALLOWED_HOSTS }}
          CLOUD_RUN_JOB_MIGRATE: ${{ vars.CLOUD_RUN_JOB_MIGRATE }}
        run: |
          set -euo pipefail
          : "${CLOUDSQL_INSTANCE:?Set repo variable CLOUDSQL_INSTANCE}"
          : "${RUNTIME_SERVICE_ACCOUNT:?Set repo variable RUNTIME_SERVICE_ACCOUNT}"
          : "${ALLOWED_HOSTS:?Set repo variable ALLOWED_HOSTS}"
          JOB="${CLOUD_RUN_JOB_MIGRATE:-beaconflame-migrate}"
          if [ -z "${JOB}" ]; then JOB=beaconflame-migrate; fi
          SEC_COMMON="SECRET_KEY=beaconflame-django-secret-key:latest,DATABASE_URL=beaconflame-database-url:latest,API_KEY_PEPPER=beaconflame-api-key-pepper:latest,CELERY_BROKER_URL=beaconflame-celery-broker-url:latest,CELERY_RESULT_BACKEND=beaconflame-celery-result-backend:latest"
          python3 <<'PY'
          import json
          import os

          out = {
              "DJANGO_SETTINGS_MODULE": "config.settings.production",
              "RUN_MIGRATE_ON_START": "0",
              "ALLOWED_HOSTS": os.environ["ALLOWED_HOSTS"],
          }
          open("/tmp/migrate-env.json", "w", encoding="utf-8").write(json.dumps(out))
          PY
          gcloud run jobs deploy "${JOB}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --image="${IMAGE}" \
            --tasks=1 \
            --max-retries=0 \
            --parallelism=1 \
            --service-account="${RUNTIME_SERVICE_ACCOUNT}" \
            --set-cloudsql-instances="${CLOUDSQL_INSTANCE}" \
            --env-vars-file=/tmp/migrate-env.json \
            --set-secrets="${SEC_COMMON}" \
            --command=python \
            --args=manage.py,migrate,--noinput
          gcloud run jobs execute "${JOB}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --wait

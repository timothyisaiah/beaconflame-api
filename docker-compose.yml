services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: beaconflame
      POSTGRES_PASSWORD: beaconflame
      POSTGRES_DB: beaconflame
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beaconflame -d beaconflame"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      SECRET_KEY: dev-docker-secret-change-me-not-production
      API_KEY_PEPPER: dev-docker-pepper-at-least-32-characters-long
      DEBUG: "1"
      DATABASE_URL: postgres://beaconflame:beaconflame@db:5432/beaconflame
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A config worker -l info
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      SECRET_KEY: dev-docker-secret-change-me-not-production
      API_KEY_PEPPER: dev-docker-pepper-at-least-32-characters-long
      DEBUG: "1"
      DATABASE_URL: postgres://beaconflame:beaconflame@db:5432/beaconflame
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:

[pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
# pytest-django picks env DJANGO_SETTINGS_MODULE over ini; `use demo` sets docker.
# --ds wins over env so tests always use eager Celery / in-memory broker (see config.settings.test).
addopts = --ds=config.settings.test
python_files = tests.py test_*.py *_tests.py
